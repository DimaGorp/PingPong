name: test

on:
    workflow_call:

jobs:
    unit_tests:
        strategy:
            fail-fast: false
            matrix:
                include:
                    # Windows 32-bit
                    - os: windows-latest
                      arch: Win32
                      name: win32

                    # Windows 64-bit
                    - os: windows-latest
                      arch: x64
                      name: win64

        runs-on: ${{ matrix.os }}
        name: Unit Tests (${{ matrix.name }})
        steps:
            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                name: build-${{ matrix.name }}
                path: build

            - name: Run unit tests (Windows)
              if: runner.os == 'Windows'
              run: |
                cd build
                ctest --output-on-failure -C Release
name: build

on:
    workflow_call:
jobs:
    build:
        strategy:
            matrix:
                include:
                    # Windows 32-bit
                    - os: windows-latest
                      arch: Win32
                      name: win32

                    # Windows 64-bit
                    - os: windows-latest
                      arch: x64
                      name: win64

                    # Ubuntu 16.04 x64 
                    - os: ubuntu-latest
                      container: ubuntu:16.04
                      name: ubuntu-1604

                    # Ubuntu 18.04 x64 
                    - os: ubuntu-latest
                      container: ubuntu:18.04
                      name: ubuntu-1804

        runs-on: ${{ matrix.os }}
        name: Build (${{ matrix.name }})
        steps:
            - uses: actions/checkout@v3

            - name: Build (Linux)
              if: runner.os == 'Linux'
              run: |
                docker run --rm \
                    -v ${{ github.workspace }}:${{ github.workspace }} \
                    -w ${{ github.workspace }} \
                    ${{ matrix.container }} \
                    bash -c "
                    apt-get update -qq &&
                    apt-get install -y build-essential cmake git &&
                    cmake --version &&
                    mkdir -p build &&
                    cd build &&
                    cmake .. &&
                    cmake --build .
                    "
            - name: Build (Windows)
              if: runner.os == 'Windows'
              run: |
                  cmake -B build -A ${{ matrix.arch }}
                  cmake --build build --config Release
            - name: Upload artifacts (Linux)
              if: runner.os == 'Linux'
              uses: actions/upload-artifact@v4
              with:
                name: build-${{ matrix.name }}
                path: ${{ github.workspace }}/build

            - name: Upload artifacts (Windows)
              if: runner.os == 'Windows'
              uses: actions/upload-artifact@v4
              with:
                name: build-${{ matrix.name }}
                path: build/Release
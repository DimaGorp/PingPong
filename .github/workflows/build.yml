name: build

on:
    workflow_call:
jobs:
    build:
        strategy:
            matrix:
                include:
                    # Windows 32-bit
                    - os: windows-latest
                      arch: Win32
                      name: win32

                    # Windows 64-bit
                    - os: windows-latest
                      arch: x64
                      name: win64

                    # Ubuntu 16.04 x64 
                    - os: ubuntu-latest
                      container: ubuntu:16.04
                      name: ubuntu-1604

                    # Ubuntu 18.04 x64 
                    - os: ubuntu-latest
                      container: ubuntu:18.04
                      name: ubuntu-1804

        runs-on: ${{ matrix.os }}
        container: ${{ matrix.container }}
        name: Build (${{ matrix.name }})
        steps:
            - uses: actions/checkout@v3

            # Linux dependencies
            - name: Install dependencies (Linux)
              if: runner.os == 'Linux'
              run: |
                  apt-get update
                  apt-get install -y build-essential cmake
            - name: Build (Windows)
              if: runner.os == 'Windows'
              run: |
                  cmake -B build -A ${{ matrix.arch }}
                  cmake --build build --config Release

            - name: Build (Linux)
              if: runner.os == 'Linux'
              run: |
                  cmake -B build
                  cmake --build build
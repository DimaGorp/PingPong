name: CI

on:
    push:
        branches: 
            - master
            - develop
            - feature/*
    pull_request:
        branches:
            - '!master'
            - '!develop'
jobs:
    format:
        uses: ./.github/workflows/format.yml
    build:
        needs: format
        uses: ./.github/workflows/build.yml
    test:
        needs: build
        uses: ./.github/workflows/test.yml